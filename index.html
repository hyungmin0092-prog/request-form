<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eglink Want List Form</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .page {
      width: 1000px;
      margin: 0 auto;
      padding: 10px 20px 40px;
    }

    .logo {
      margin-bottom: 10px;
    }

    .logo img {
      width: 520px;
      max-width: 100%;
      display: block;
    }

    .info-section {
      margin-top: 10px;
      margin-left: 12px;
      line-height: 1.45;
      font-size: 16px;
    }

    .info-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .highlight-red {
      color: red;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }

    .normal-text {
      margin-top: 28px;
      font-size: 16px;
    }

    .big-red {
      margin-top: 28px;
      color: red;
      font-size: 22px;
      font-weight: bold;
    }

    .want-list-box {
      margin-top: 35px;
      background: #d6d6d6;
      border-radius: 16px;
      padding: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 16px;
      padding-bottom: 20px;
      font-weight: bold;
    }

    td {
      vertical-align: top;
      padding: 10px 8px;
    }

    .qty-input {
      width: 50px;
      height: 22px;
    }

    .model-name {
      font-size: 16px;
      font-weight: bold;
      line-height: 1.4;
    }

    .warranty-select {
      width: 120px;
      height: 30px;
    }

    .price-input {
      width: 80px;
      height: 24px;
    }

    .comment-box {
      width: 100%;
      min-width: 280px;
      height: 70px;
      resize: vertical;
    }

    .price-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .call-wrap {
      font-size: 14px;
    }

    .submit-wrap {
      text-align: right;
      margin-top: 20px;
    }

    .submit-btn {
      padding: 6px 18px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- 좌측 상단 로고 -->
  <div class="logo">
    <img src="logo.png" alt="Eglink System Logo" />
  </div>

  <!-- 구글 시트에서 불러올 영역 -->

    <div id="userName"></div>
    <div id="userPhone"></div>
    <div id="userEmail"></div>

<!-- 하단 테이블 -->

<form
  action="https://script.google.com/macros/s/AKfycbzu2I_2v76i99QwdYRq1qT_k7xOk53sr1FVhfLcj6dGuL7i6vJZsDdU28zh_9cdDho/exec"
  method="POST"
>

        />
      </td>

      <!-- warranty -->

          class="warranty-select"

          <option>(Select Here)</option>
          <option>30 Days</option>
          <option>90 Days</option>

      </td>

      <!-- price -->
      <td>
        <div class="price-wrap">
          $
          <input
            type="text"
            name="price"
            class="price-input"
          />
        </div>

        <div class="call-wrap">
          Call:
          <input
            type="checkbox"
            name="call"
            value="Yes"
          />
        </div>
      </td>

      <!-- comments -->
      <td>
        <textarea

      </td>

    </tr>
    <tr>

      <!-- model -->
      <td>
        <div class="model-name">Keithley 2400</div>
        <input
          type="hidden"
          name="model"
          value="Associated Research 3670"
        />
      </td>

      <!-- qty -->
      <td>
        <input
          type="text"
          name="qty"
          class="qty-input"
        />
      </td>

      <!-- warranty -->
      <td>
        <select
          name="warranty"
          class="warranty-select"
        >
          <option>(Select Here)</option>
          <option>30 Days</option>
          <option>90 Days</option>
          <option>6 Months</option>
          <option>1 Year</option>
        </select>
      </td>

      <!-- price -->
      <td>
        <div class="price-wrap">
          $
          <input
            type="text"
            name="price"
            class="price-input"
          />
        </div>

        <div class="call-wrap">
          Call:
          <input
            type="checkbox"
            name="call"

        </div>

      <!-- comments -->
      <td>

        ></textarea>

    </tr>
    <tr>

      <!-- model -->
      <td>

        <input

          name="model"
          value="Associated Research 3670"
        />
      </td>

      <!-- qty -->
      <td>
        <input
          type="text"

          class="qty-input"
        />

      <!-- warranty -->
      <td>

  </tbody>
</table>

<!-- email 자동 전달 -->
<input
  type="hidden"
  id="hiddenEmail"
  name="email"
/>

<div class="submit-wrap">
  <button
    type="submit"
    class="submit-btn"
  >
    Submit
  </button>
</div>

</form>

</div>

<script>
/*
메일 링크 예시
https://yourdomain.com/index.html?email=eglink@eglink.co.kr

Google Sheet에서 email 기준으로 사용자 정보 조회
GAS Web App에서 JSON 응답 받는 방식
*/

const GAS_URL = "https://script.google.com/macros/s/AKfycbxdt9X5gzQM-lXXv0CMSpNLAaYTBDIikeY6Sr6ZHNfzDB9mO-QnpTy1bcYW9LOp3DnI/exec";

const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (email) {
  fetch(`${GAS_URL}?email=${encodeURIComponent(email)}`)
    .then(res => res.json())
    .then(data => {
      console.log(data);

      document.querySelector(".info-title").innerText = data.title || "";
      document.getElementById("userName").innerText = data.name || "";
      document.getElementById("userPhone").innerText =
        "Phone: " + (data.phone || "");
      document.getElementById("userEmail").innerText =
        "Email: " + (data.email || "");
      document.getElementById("hiddenEmail").value = email;
    })
    .catch(err => {
      console.log("불러오기 실패", err);
    });
}
</script>

</body>
</html>
