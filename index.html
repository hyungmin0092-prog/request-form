<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eglink Want List Form</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .page {
      width: 1000px;
      margin: 0 auto;
      padding: 10px 20px 40px;
    }

    .logo {
      margin-bottom: 10px;
    }

    .logo img {
      width: 520px;
      max-width: 100%;
      display: block;
    }

    .info-section {
      margin-top: 10px;
      margin-left: 12px;
      line-height: 1.45;
      font-size: 16px;
    }

    .info-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .highlight-red {
      color: red;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }

    .normal-text {
      margin-top: 28px;
      font-size: 16px;
    }

    .big-red {
      margin-top: 28px;
      color: red;
      font-size: 22px;
      font-weight: bold;
    }

    .want-list-box {
      margin-top: 35px;
      background: #d6d6d6;
      border-radius: 16px;
      padding: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 16px;
      padding-bottom: 20px;
      font-weight: bold;
    }

    td {
      vertical-align: top;
      padding: 10px 8px;
    }

    .qty-input {
      width: 50px;
      height: 22px;
    }

    .model-name {
      font-size: 16px;
      font-weight: bold;
      line-height: 1.4;
    }

    .warranty-select {
      width: 120px;
      height: 30px;
    }

    .price-input {
      width: 80px;
      height: 24px;
    }

    .comment-box {
      width: 100%;
      min-width: 280px;
      height: 70px;
      resize: vertical;
    }

    .price-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .call-wrap {
      font-size: 14px;
    }

    .submit-wrap {
      text-align: right;
      margin-top: 20px;
    }

    .submit-btn {
      padding: 6px 18px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- 좌측 상단 로고 -->
  <div class="logo">
    <img src="logo.png" alt="Eglink System Logo" />
  </div>

  <!-- 구글 시트에서 불러올 영역 -->
  <div class="info-section">
    <div class="info-title"></div>

    <div id="userName"></div>
    <div id="userPhone"></div>
    <div id="userEmail"></div>
    
    

    

    

    
  </div>

<!-- 하단 테이블 -->
<div class="want-list-box">

<form
  action="https://script.google.com/macros/s/AKfycbywUuP_ZzOy7kPQzSdD03sFLp17ntAv5_d6DwdFd4daQS4WJJFwJmAqip0VP06zXUE/exec"
  method="POST"
>

<table>
  <thead>
    <tr>
      <th style="width:320px;">Model</th>
      <th style="width:80px;">Qty</th>
      <th style="width:160px;">Warrenty</th>
      <th style="width:170px;">Price</th>
      <th>Comments</th>
    </tr>
  </thead>

  <tbody id="modelTableBody">
  </tbody>
</table>

<!-- email 자동 전달 -->
<input
  type="hidden"
  id="hiddenEmail"
  name="email"
/>

<div class="submit-wrap">
  <button
    type="submit"
    class="submit-btn"
  >
    Submit
  </button>
</div>

</form>

</div>

<script>
/*
메일 링크 예시
https://yourdomain.com/index.html?email=eglink@eglink.co.kr

Google Sheet에서 email 기준으로 사용자 정보 조회
GAS Web App에서 JSON 응답 받는 방식
*/

const GAS_URL = "https://script.google.com/macros/s/AKfycbwfM54hwyDg-FZZYyTLnPYlDhPkCaD6ZsO58sfjkZ8UDcsxFiXSMBpWuDjUpz2yQoYL/exec";

const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (email) {
  fetch(`${GAS_URL}?email=${encodeURIComponent(email)}`)
    .then(res => res.json())
    .then(data => {
      console.log(data);

      document.querySelector(".info-title").innerText = data.title || "";
      document.getElementById("userName").innerText = data.name || "";
      document.getElementById("userPhone").innerText =
        "Phone: " + (data.phone || "");
      document.getElementById("userEmail").innerText =
        "Email: " + (data.email || "");
      document.getElementById("hiddenEmail").value = email;

      const tbody = document.getElementById("modelTableBody");

      data.models.forEach(model => {
      tbody.innerHTML += `
      <tr>
        <td>
          <div class="model-name">${model}</div>
          <input type="hidden" name="model" value="${model}" />
        </td>

        <td>
          <input type="text" name="qty" class="qty-input" />
        </td>

        <td>
          <select name="warranty" class="warranty-select">
            <option>(Select Here)</option>
            <option>30 Days</option>
            <option>90 Days</option>
            <option>6 Months</option>
            <option>1 Year</option>
          </select>
        </td>

        <td>
          <input type="text" name="price" class="price-input" />
        </td>

        <td>
          <textarea name="comments" class="comment-box"></textarea>
        </td>
      </tr>
      `;
      });
    })
    .catch(err => {
      console.log("불러오기 실패", err);
    });
}
</script>

</body>
</html>
